[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "echo START && python -c \"import psycopg2, os; print('connecting...'); psycopg2.connect(os.getenv('DATABASE_URL'), connect_timeout=10); print('CONNECTED')\" && echo MIGRATED && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
